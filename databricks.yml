# This is a Databricks asset bundle definition for dab_project_prac.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: dab_project_prac
  uuid: 4bbcbed9-8055-431d-94e2-89b15c322110

include:
  - resources/*.yml

sync:
  exclude:
    - ".venv_dbc"
    - "__pycache__"

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
    default: "citibike_dev"
  schema:
    description: The schema to use
    default: "dev"
  dev_flag:
    default: true

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405615186355742.2.azuredatabricks.net
    presets:
      artifacts_dynamic_version: true
  test:
    mode: production
    variables:
      catalog: "citibike_test"
      schema: "test"
      dev_flag: false
    presets:
      name_prefix: '[testing] '
    workspace:
      host: https://adb-7405608244596942.2.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/kaustuv.chatterjee_gmail.com#ext#@kaustuvchatterjeegmail.onmicrosoft.com to make sure we only have a single copy.
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - user_name: kaustuv.chatterjee_gmail.com#ext#@kaustuvchatterjeegmail.onmicrosoft.com
        level: CAN_MANAGE
  prod:
    mode: production
    variables:
      catalog: "citibike_prod"
      schema: "prod"
      dev_flag: false
    workspace:
      host: https://adb-7405614345824837.17.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/kaustuv.chatterjee_gmail.com#ext#@kaustuvchatterjeegmail.onmicrosoft.com to make sure we only have a single copy.
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - user_name: kaustuv.chatterjee_gmail.com#ext#@kaustuvchatterjeegmail.onmicrosoft.com
        level: CAN_MANAGE
